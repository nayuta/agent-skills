$schema: ../workflow.schema.json

server:
  port: 18084

metrics:
  enabled: true

issue_tracker:
  type: linear
  api_key: $LINEAR_API_KEY
  team_id: $LINEAR_TEAM_ID
  project: "agent-skills"
  candidate_states:
    - Todo
    - "In Progress"
    - "Ready for Review"
  terminal_states:
    - Done
    - Canceled
  state_labels:
    enabled: true
    claimed: "nyaphony:claimed"
    running: "nyaphony:running"
    retry: "nyaphony:retry"
    failed: "nyaphony:failed"

notifications:
  slack:
    enabled: false
    webhook_url: $NYAPHONY_SLACK_WEBHOOK_URL
    events:
      - workflow_start
      - workflow_complete

logging:
  level: debug
  file_path: ./nyaphony.log
  use_stdout: true

coding_agent:
  type: claude
  model: claude-sonnet-4-6
  command: claude
  permission_mode: dangerously-skip-permissions
  max_turns: 60
  stall_timeout: 300
  log_level: debug

orchestrator:
  poll_interval: 60
  max_concurrent: 3
  max_retries: 1
  dispatch_order: ticket_priority
  workflows:
    - name: plan-draft
      priority: -20
      max_retries: 1
      max_parallelism: 2
      filter:
        states:
          - Todo
        exclude_labels:
          - "Plan Drafted"
          - Planned
          - "PR Created"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:plan-draft {{.Issue.Identifier}}"
      use_workspace: false
      on_success:
        add_label: "Plan Drafted"
        require_comment: "## Plan: Draft Ready"
      on_failure:
        add_label: "Automation Failed"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: plan-review-fix
      priority: -10
      max_retries: 3
      max_parallelism: 2
      filter:
        states:
          - Todo
        require_labels:
          - "Plan Drafted"
        exclude_labels:
          - Planned
          - "PR Created"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:plan-review-fix {{.Issue.Identifier}}"
      use_workspace: false
      on_success:
        add_label: Planned
        remove_label: "Plan Drafted"
        require_comment: "## Plan: Reviewed"
        retry_on_comment_mismatch: true
      on_failure:
        add_label: "Automation Failed"
        remove_label: "Plan Drafted"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: develop-impl
      priority: 0
      max_retries: 1
      max_parallelism: 2
      filter:
        states:
          - Todo
          - "In Progress"
        require_labels:
          - Planned
        exclude_labels:
          - "PR Created"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:develop-impl {{.Issue.Identifier}}"
      use_workspace: false
      use_worktree: true
      on_start:
        transition_state: "In Progress"
      on_success:
        add_label: "PR Created"
        remove_label: Planned
        require_comment: "## Implementation: Done"
      on_failure:
        add_label: "Automation Failed"
        remove_label: Planned
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: develop-fix-restart
      priority: 3
      max_retries: 1
      max_parallelism: 1
      filter:
        states:
          - Todo
        require_labels:
          - "PR Created"
        exclude_labels:
          - "PR Reviewed"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:develop-review-fix {{.Issue.Identifier}}"
      use_workspace: false
      use_worktree: true
      on_start:
        transition_state: "In Progress"
      on_success:
        add_label: "PR Reviewed"
        remove_label: "PR Created"
        require_comment: "## Review: Clean"
        retry_on_comment_mismatch: true
      on_failure:
        add_label: "Automation Failed"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: develop-review-fix
      priority: 5
      max_retries: 3
      max_parallelism: 2
      filter:
        states:
          - "In Progress"
        require_labels:
          - "PR Created"
        exclude_labels:
          - "PR Reviewed"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:develop-review-fix {{.Issue.Identifier}}"
      use_workspace: false
      use_worktree: true
      on_success:
        add_label: "PR Reviewed"
        remove_label: "PR Created"
        require_comment: "## Review: Clean"
        retry_on_comment_mismatch: true
      on_failure:
        add_label: "Automation Failed"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: develop-verify
      priority: 10
      max_parallelism: 2
      filter:
        states:
          - "In Progress"
        require_labels:
          - "PR Reviewed"
        exclude_labels:
          - "Requirements Verified"
          - "No Automation"
          - Blocked
          - Delayed
      command: "/ticket:develop-verify {{.Issue.Identifier}}"
      use_worktree: true
      max_retries: 1
      on_success:
        transition_state: "Ready for Review"
        add_label: "Requirements Verified"
        remove_label: "PR Reviewed"
        require_comment: "## Requirements: Verified"
        mark_pr_ready: true
      on_failure:
        add_label: "Automation Failed"
        remove_label: "PR Reviewed"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: bot-review-fix
      enabled: false
      priority: 15
      max_retries: 3
      max_parallelism: 2
      filter:
        states:
          - "Ready for Review"
        require_labels:
          - "Requirements Verified"
        exclude_labels:
          - "No Automation"
          - "Bot Review Fixed"
          - Blocked
          - Delayed
      command: "/ticket:develop-bot-review-fix {{.Issue.Identifier}}"
      use_workspace: false
      use_worktree: true
      bot_review:
        reviewers:
          - copilot
        required: false
        poll_interval: 60
        max_wait: 600
        max_fix_iterations: 3
      on_success:
        add_label: "Bot Review Fixed"
        remove_label: "Requirements Verified"
        require_comment: "## (Bot Review: Fixed|Review: Clean)"
        retry_on_comment_mismatch: true
      on_failure:
        add_label: "Automation Failed"
        remove_label: "Requirements Verified"
        command: "/ticket:failure-analysis {{.Issue.Identifier}}"

    - name: conflict-resolution
      priority: 20
      max_parallelism: 1
      filter:
        states:
          - "Ready for Review"
        exclude_labels:
          - "No Automation"
          - Blocked
          - Delayed
          - "Conflicts Resolved"
        require_conflicts: true
      command: "/integration:pr-conflict {{.Issue.PRURL}}"
      use_workspace: false
      on_success:
        add_label: "Conflicts Resolved"
      on_failure:
        add_label: "Automation Failed"

workspace:
  root: ~/workspaces/agent-skills
  after_create: |
    git clone $REPO_URL . 2>/dev/null || true
    git checkout -b $BRANCH_NAME 2>/dev/null || true
